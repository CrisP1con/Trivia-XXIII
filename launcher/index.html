<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Configuración de Servidor</title>
  <style>
    body { font-family: sans-serif; background: #0F172A; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
    .card { background: #1E293B; padding: 2rem; border-radius: 12px; text-align: center; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    h2 { margin-top: 0; color: #F8FAFC; }
    p { color: #94A3B8; font-size: 0.9rem; margin-bottom: 20px; }
    input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #334155; background: #0F172A; color: white; box-sizing: border-box; font-size: 1rem; }
    button { background: #5051F9; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; }
    .reset-btn { margin-top: 15px; background: transparent; border: 2px solid #EB5757; color: #EB5757; }
  </style>
</head>
<body>
  <div class="card" id="mainCard">
    <h2>Configurar Servidor</h2>
    <p>Ingresá la IP o URL del servidor para continuar:</p>
    <input type="text" id="serverUrl" placeholder="Ej: http://192.168.0.6:3001">
    <button onclick="saveAndRedirect()">Conectar al Juego</button>
  </div>

  <script>
    const savedUrl = localStorage.getItem('historia_server_url');
    
    // Si ya hay una URL guardada, redirigimos INMEDIATAMENTE sin demoras.
    // Si se equivocan de IP, deberán borrar los datos (caché) de la app desde los ajustes de Android.
    if (savedUrl) {
      window.location.replace(savedUrl);
    }

    function saveAndRedirect() {
      let url = document.getElementById('serverUrl').value.trim();
      if (!url) return alert('Por favor, ingresá una IP o URL');
      if (!url.startsWith('http')) {
        url = 'http://' + url; // Auto-agrega http si se olvidan
      }
      
      localStorage.setItem('historia_server_url', url);
      window.location.replace(url);
    }
  </script>
</body>
</html>
